services:
  the-monastery:
    image: ${THE_MONASTERY_IMAGE:-ghcr.io/idanbot/the-monastery:latest}
    pull_policy: always
    container_name: the-monastery
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      THE_MONASTERY_DATA_DIR: /data
      LOG_LEVEL: info
    ports:
      - '127.0.0.1:8181:3000'
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      com.centurylinklabs.watchtower.scope: 'the-monastery'
    volumes:
      - the-monastery-data:/data
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower:latest
    container_name: the-monastery-watchtower
    restart: unless-stopped
    command: --label-enable --scope the-monastery --cleanup --interval 300
    labels:
      com.centurylinklabs.watchtower.scope: 'the-monastery'
    environment:
      DOCKER_API_VERSION: '1.40'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  the-monastery-data:
