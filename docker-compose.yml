services:
  the-monastery:
    image: ${THE_MONASTERY_IMAGE:-ghcr.io/idanbot/the-monastery:latest}
    pull_policy: always
    container_name: the-monastery
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      THE_MONASTERY_DATA_DIR: /data
      LOG_LEVEL: info
      THE_MONASTERY_OWNER_TOKEN: ${THE_MONASTERY_OWNER_TOKEN:-}
      THE_MONASTERY_BODY_LIMIT: ${THE_MONASTERY_BODY_LIMIT:-1048576}
      THE_MONASTERY_API_RATE_LIMIT_MAX: ${THE_MONASTERY_API_RATE_LIMIT_MAX:-300}
      THE_MONASTERY_API_RATE_LIMIT_WINDOW: ${THE_MONASTERY_API_RATE_LIMIT_WINDOW:-1 minute}
      THE_MONASTERY_DISCORD_WEBHOOK_URL: ${THE_MONASTERY_DISCORD_WEBHOOK_URL:-}
      THE_MONASTERY_SLACK_WEBHOOK_URL: ${THE_MONASTERY_SLACK_WEBHOOK_URL:-}
      THE_MONASTERY_TELEGRAM_BOT_TOKEN: ${THE_MONASTERY_TELEGRAM_BOT_TOKEN:-}
      THE_MONASTERY_TELEGRAM_CHAT_ID: ${THE_MONASTERY_TELEGRAM_CHAT_ID:-}
      THE_MONASTERY_ICS_SUBSCRIPTION_URLS: ${THE_MONASTERY_ICS_SUBSCRIPTION_URLS:-}
      THE_MONASTERY_CALDAV_URL: ${THE_MONASTERY_CALDAV_URL:-}
      THE_MONASTERY_CALDAV_USERNAME: ${THE_MONASTERY_CALDAV_USERNAME:-}
      THE_MONASTERY_CALDAV_PASSWORD: ${THE_MONASTERY_CALDAV_PASSWORD:-}
    ports:
      - '127.0.0.1:8181:3000'
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      com.centurylinklabs.watchtower.scope: 'the-monastery'
    volumes:
      - the-monastery-data:/data
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower:1.7.1@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    container_name: the-monastery-watchtower
    restart: unless-stopped
    command: --label-enable --scope the-monastery --cleanup --interval 300
    labels:
      com.centurylinklabs.watchtower.scope: 'the-monastery'
    environment:
      DOCKER_API_VERSION: '1.40'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: local
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  the-monastery-data:
